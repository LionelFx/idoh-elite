<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <!-- Yellow background -->
  <rect width="200" height="140" fill="#FFCC00"/>
  <!-- La Poste bird mark — two blue diagonal swooshes -->
  <!-- Upper swoosh (beak/head) -->
  <polygon points="28,22 148,16 138,46 58,52" fill="#003189"/>
  <!-- Lower swoosh (wing/body) -->
  <polygon points="18,64 108,58 152,90 38,100" fill="#003189"/>
  <!-- Yellow gap between swooshes (gives the bird silhouette) -->
  <polygon points="58,52 138,46 130,60 55,64" fill="#FFCC00"/>
  <!-- LA POSTE wordmark -->
  <text x="100" y="128"
        font-family="'Arial Black','Franklin Gothic Heavy',Arial,sans-serif"
        font-size="28" font-weight="900" fill="#003189"
        text-anchor="middle" letter-spacing="1">LA POSTE</text>
</svg>
